# ── Hostname ──────────────────────────────────
hostname=localhost
hostname-strict=false

# ── HTTP config ───────────────────────────────
http-port=8080

# ── Cookie / Cross-browser fix ────────────────
# Cho phép action token (reset password link) hoạt động
# khi mở ở browser khác không có session cookie
spi-login-protocol-openid-connect-legacy-logout-redirect-uri=true

# Tắt SameSite=Strict trên cookie AUTH_SESSION_ID
# để link trong email hoạt động cross-browser
spi-cookie-same-site-legacy-switch=true

# ── Logging ───────────────────────────────────
log-level=INFO
